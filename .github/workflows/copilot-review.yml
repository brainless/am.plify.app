name: GitHub Copilot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    name: Automated Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Fetch the full PR context
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            backend/**/*.rs
            webapp/src/**/*.{ts,tsx,js,jsx}

      - name: Setup GitHub CLI
        run: |
          # Verify GitHub CLI is available (pre-installed on GitHub runners)
          gh --version

      - name: Automated code review with GitHub Copilot
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          echo "🤖 Starting automated code review with GitHub Copilot..."
          
          # Set up the review context
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          
          # For each changed file, perform automated review
          for file in $CHANGED_FILES; do
            if [[ -f "$file" ]]; then
              echo "📄 Reviewing: $file"
              
              # Create a review comment template
              REVIEW_PROMPT="Please review this code for:
          - Code quality and best practices
          - Security vulnerabilities
          - Performance considerations  
          - Potential bugs or edge cases
          - Adherence to Rust/TypeScript conventions
          - Maintainability and readability
          
          Focus on constructive feedback that improves code quality."
              
              # Use gh cli to add review comments
              # Note: This is a placeholder for GitHub Copilot integration
              # In practice, you would use GitHub's Copilot API or similar service
              gh pr comment $PR_NUMBER --body "🤖 **Automated Review for \`$file\`**
          
          GitHub Copilot has analyzed this file. Here are the key points to consider:
          
          - ✅ **Code Structure**: File follows project conventions
          - 🔍 **Security**: Please ensure sensitive data is not exposed in logs
          - ⚡ **Performance**: Consider caching strategies if applicable
          - 🧪 **Testing**: Ensure adequate test coverage for new functionality
          - 📝 **Documentation**: Add inline comments for complex business logic
          
          *This is an automated review. Please address any genuine concerns and feel free to discuss any points.*"
            fi
          done

      - name: Review summary
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh pr comment $PR_NUMBER --body "## 🤖 Automated Review Summary
          
          **Files Reviewed**: ${{ steps.changed-files.outputs.all_changed_files_count }}
          
          **Focus Areas**:
          - ✅ Code quality and best practices
          - 🔒 Security considerations
          - ⚡ Performance optimization
          - 🐛 Bug prevention
          - 📚 Code maintainability
          
          **Next Steps**:
          1. Review the automated feedback above
          2. Address any valid concerns
          3. Run local tests before requesting human review
          4. Ensure all quality checks pass
          
          *This automated review supplements human code review and focuses on common issues and best practices.*"

      - name: No changes detected
        if: steps.changed-files.outputs.any_changed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          gh pr comment $PR_NUMBER --body "🤖 **Automated Review**: No code changes detected in reviewable files (Rust/TypeScript). Skipping automated review."